{% extends 'user/base.html' %}

{% block title %}Create Post{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card card-custom border-0 shadow-sm">
            <div class="card-body p-4">
                <h2 class="h4 fw-bold mb-3">Create Post</h2>
                <p class="text-muted mb-4">Share your latest update on the community feed.</p>
                
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 py-2">Publish</button>
                </form>

                <div class="mt-3 text-end">
                    <a class="btn btn-link" href="{% url 'home' %}">Back to Home</a>
                </div>
                <h5 class="mt-4 text-muted">Your IP Address: {{ ip }}</h5>   
            </div>
        </div>
    </div>
</div>
{% endblock %}
