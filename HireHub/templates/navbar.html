<script>
// Navbar scroll effects and enhancements
document.addEventListener('DOMContentLoaded', function() {
    const navbar = document.querySelector('.navbar-glass');
    let lastScrollY = window.scrollY;

    // Navbar scroll effect
    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
        
        // Parallax effect for navbar
        const scrolled = window.scrollY;
        navbar.style.transform = `translateY(${Math.min(scrolled * 0.1, 20)}px)`;
    });

    // Smooth scrolling for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
                target.scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
            }
        });
    });

    // Active link highlighting
    const currentPage = window.location.pathname;
    document.querySelectorAll('.nav-link').forEach(link => {
        if (link.getAttribute('href') === currentPage || 
            link.getAttribute('href') === currentPage + '/' ||
            link.closest('a').getAttribute('href') === currentPage) {
            link.classList.add('active');
        }
    });

    // Mobile menu smooth open/close
    const navbarToggler = document.querySelector('.navbar-toggler');
    const navbarCollapse = document.querySelector('.navbar-collapse');
    
    navbarToggler.addEventListener('click', function() {
        navbarCollapse.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
    });
});

// Close mobile menu when clicking outside
document.addEventListener('click', function(event) {
    const navbarCollapse = document.querySelector('.navbar-collapse');
    const navbarToggler = document.querySelector('.navbar-toggler');
    
    if (window.innerWidth < 992 && 
        navbarCollapse.classList.contains('show') && 
        !navbarCollapse.contains(event.target) && 
        !navbarToggler.contains(event.target)) {
        bootstrap.Collapse.getInstance(navbarCollapse).hide();
    }
});
</script>
