<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>hello {{name}}</h1>
    {% if messages %}
    {% for message in messages %}
    <small {% if message.tags %} class="{{message.tags}}"{% endif %} >{{message}}</small>
    {% endfor %}
    {% endif %}
    <a href="{% url 'logout' %}">Log Out</a>
</body>
</html>
