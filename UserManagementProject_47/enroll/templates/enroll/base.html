<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}User Management System{% endblock %}</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'enroll/css/style.css' %}">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <header>
        <nav class="navbar">
            <div class="logo">UserMS</div>

            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'login' %}" class="btn-nav">Enroll</a>
            </div>
        </nav>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>© 2026 User Management System | All Rights Reserved</p>
    </footer>

</body>
</html>
