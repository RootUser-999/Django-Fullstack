{% extends 'blog/base.html' %}
{% block title %}Edit Post{% endblock title %}
{% block content %}
 <form action="" method="POST">
            {% csrf_token %}
             {% for fm in form %}
            {{ fm.label_tag }}    {{ fm }} {{fm.errors|striptags}} <br><br>
            {% endfor %}
            <input type="submit" value="Update">
            {% for m in messages %}
                <p>{{ m }}</p>
            {% endfor %}
        </form>
{% endblock content %}
